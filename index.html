<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AttendX — Smart Attendance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0a14;font-family:'DM Sans',sans-serif;}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#0a0a14}
    ::-webkit-scrollbar-thumb{background:#63b3ed44;border-radius:3px}
    input::placeholder{color:rgba(226,232,240,0.22)!important;}
    input{caret-color:#63b3ed;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .fu{animation:fadeUp 0.3s ease forwards;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── localStorage ─────────────────────────────────────────────
    function loadTeacher() {
      try { return JSON.parse(localStorage.getItem("attendx_teacher")); } catch { return null; }
    }
    function saveTeacher(t) {
      try { localStorage.setItem("attendx_teacher", JSON.stringify(t)); } catch {}
    }
    function loadClasses() {
      try { return JSON.parse(localStorage.getItem("attendx_classes")) || []; } catch { return []; }
    }
    function saveClasses(arr) {
      try { localStorage.setItem("attendx_classes", JSON.stringify(arr)); } catch {}
    }

    // ─── Helpers ──────────────────────────────────────────────────
    function genCode() { return Math.random().toString(36).substring(2,8).toUpperCase(); }
    function todayStr() { return new Date().toISOString().split("T")[0]; }
    function calcPct(sid, attendance, holidays) {
      const hols = new Set(holidays||[]);
      const days = Object.keys(attendance||{}).filter(d=>!hols.has(d));
      if(!days.length) return null;
      const present = days.filter(d=>attendance[d]?.[sid]===true).length;
      return Math.round((present/days.length)*100);
    }
    function getGrade(pct) {
      if(pct===null) return null;
      if(pct>=85) return {color:"#48bb78",bg:"rgba(72,187,120,0.13)",border:"rgba(72,187,120,0.32)",label:"Safe 🟢"};
      if(pct>=65) return {color:"#ecc94b",bg:"rgba(236,201,75,0.13)",border:"rgba(236,201,75,0.32)",label:"Warning 🟡"};
      if(pct>=40) return {color:"#ed8936",bg:"rgba(237,137,54,0.13)",border:"rgba(237,137,54,0.32)",label:"Danger 🟠"};
      return {color:"#fc8181",bg:"rgba(252,129,129,0.13)",border:"rgba(252,129,129,0.32)",label:"Critical 🔴"};
    }

    // ─── UI Components ─────────────────────────────────────────────
    const IS = {width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(99,179,237,0.2)",borderRadius:"10px",color:"#e2e8f0",fontSize:"0.92rem",fontFamily:"'DM Sans',sans-serif",outline:"none",transition:"border 0.2s"};
    const fi = e => e.target.style.borderColor="#63b3ed";
    const fo = e => e.target.style.borderColor="rgba(99,179,237,0.2)";

    function Field({label,children}){
      return <div style={{marginBottom:"0.85rem"}}>
        <div style={{fontSize:"0.75rem",fontWeight:600,color:"rgba(226,232,240,0.4)",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:5}}>{label}</div>
        {children}
      </div>;
    }

    function TxtInput({value,onChange,placeholder,onKeyDown,autoFocus}){
      return <input type="text" value={value} onChange={onChange} placeholder={placeholder} onKeyDown={onKeyDown} autoFocus={autoFocus} style={IS} onFocus={fi} onBlur={fo}/>;
    }

    function PwdInput({value,onChange,onKeyDown,show,toggleShow}){
      return <div style={{position:"relative"}}>
        <input type={show?"text":"password"} value={value} onChange={onChange} onKeyDown={onKeyDown} placeholder="Enter password" style={{...IS,paddingRight:"42px"}} onFocus={fi} onBlur={fo}/>
        <button type="button" onClick={toggleShow} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"rgba(226,232,240,0.35)",fontSize:"1rem"}}>{show?"🙈":"👁️"}</button>
      </div>;
    }

    function PBtn({onClick,children,full,sm,disabled,danger}){
      const bg=disabled?"rgba(99,179,237,0.15)":danger?"linear-gradient(135deg,#fc8181,#f56565)":"linear-gradient(135deg,#63b3ed,#4fd1c5)";
      return <button type="button" onClick={onClick} disabled={disabled} style={{width:full?"100%":"auto",padding:sm?"7px 14px":"11px 22px",background:bg,border:"none",borderRadius:"10px",color:disabled?"rgba(226,232,240,0.3)":"#0a0a14",fontWeight:700,fontSize:sm?"0.82rem":"0.92rem",cursor:disabled?"not-allowed":"pointer",fontFamily:"'Syne',sans-serif",boxShadow:disabled?"none":"0 0 16px rgba(99,179,237,0.22)",transition:"transform 0.15s"}}
        onMouseEnter={e=>{if(!disabled)e.currentTarget.style.transform="scale(1.03)"}}
        onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)"}}
      >{children}</button>;
    }

    function GBtn({onClick,children,full,sm}){
      return <button type="button" onClick={onClick} style={{width:full?"100%":"auto",padding:sm?"7px 14px":"11px 20px",background:"transparent",border:"1px solid rgba(99,179,237,0.2)",borderRadius:"10px",color:"rgba(226,232,240,0.45)",fontWeight:500,fontSize:sm?"0.82rem":"0.9rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all 0.2s"}}
        onMouseEnter={e=>{e.currentTarget.style.borderColor="#63b3ed";e.currentTarget.style.color="#63b3ed"}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(99,179,237,0.2)";e.currentTarget.style.color="rgba(226,232,240,0.45)"}}
      >{children}</button>;
    }

    function Card({children,style={}}){
      return <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(99,179,237,0.13)",borderRadius:"15px",padding:"1.35rem",...style}}>{children}</div>;
    }

    function ErrMsg({msg}){
      if(!msg) return null;
      return <div style={{background:"rgba(252,129,129,0.1)",border:"1px solid rgba(252,129,129,0.28)",borderRadius:"9px",padding:"9px 12px",color:"#fc8181",fontSize:"0.83rem",marginTop:"10px"}}>⚠️ {msg}</div>;
    }
    function OkMsg({msg}){
      if(!msg) return null;
      return <div style={{background:"rgba(72,187,120,0.1)",border:"1px solid rgba(72,187,120,0.28)",borderRadius:"9px",padding:"9px 12px",color:"#48bb78",fontSize:"0.83rem",marginTop:"10px"}}>✅ {msg}</div>;
    }

    function Topbar({left,right}){
      return <div style={{height:60,background:"rgba(8,8,18,0.97)",borderBottom:"1px solid rgba(99,179,237,0.1)",backdropFilter:"blur(18px)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1.4rem",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:9,background:"linear-gradient(135deg,#63b3ed,#4fd1c5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,boxShadow:"0 0 12px rgba(99,179,237,0.38)"}}>🎓</div>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,color:"#e2e8f0",fontSize:"1rem"}}>AttendX</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:9}}>{left}</div>
        <div style={{display:"flex",alignItems:"center",gap:9}}>{right}</div>
      </div>;
    }

    function Credit(){
      return <div style={{textAlign:"center",marginTop:"1.4rem",paddingTop:"1.1rem",borderTop:"1px solid rgba(99,179,237,0.08)",fontSize:"0.73rem",fontWeight:600,background:"linear-gradient(135deg,#63b3ed,#4fd1c5)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>
        ⚡ by Raunak · Holkar Science College
      </div>;
    }

    function Wrap({children}){
      return <div style={{minHeight:"100vh",background:"#0a0a14",color:"#e2e8f0",fontFamily:"'DM Sans',sans-serif"}}>{children}</div>;
    }

    // ═══════════════════════════════════════════════════════════════
    // SETUP
    // ═══════════════════════════════════════════════════════════════
    function Setup({onDone}){
      const [name,setName]=useState("");
      const [id,setId]=useState("");
      const [pw,setPw]=useState("");
      const [pw2,setPw2]=useState("");
      const [show,setShow]=useState(false);
      const [err,setErr]=useState("");

      function submit(){
        setErr("");
        const n=name.trim(),i=id.trim();
        if(!n) return setErr("Please enter your name.");
        if(i.length<4) return setErr("Teacher ID must be at least 4 characters.");
        if(pw.length<6) return setErr("Password must be at least 6 characters.");
        if(pw!==pw2) return setErr("Passwords do not match — please re-enter.");
        const t={name:n,id:i,password:pw};
        saveTeacher(t);
        onDone(t);
      }

      return <Wrap>
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem 1.2rem"}}>
          <Card style={{width:"100%",maxWidth:420}}>
            <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
              <div style={{fontSize:"2.6rem",marginBottom:"0.5rem"}}>👋</div>
              <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:"1.55rem",fontWeight:800,color:"#e2e8f0",marginBottom:"0.3rem"}}>First Time Setup</h2>
              <p style={{color:"rgba(226,232,240,0.35)",fontSize:"0.85rem"}}>Create your account once — then just login!</p>
            </div>
            <div style={{background:"rgba(79,209,197,0.07)",border:"1px solid rgba(79,209,197,0.18)",borderRadius:10,padding:"8px 12px",marginBottom:"1.2rem",fontSize:"0.8rem",color:"rgba(79,209,197,0.85)",display:"flex",gap:8}}>
              <span>🔒</span><span>Remember your ID & password — you'll need them every time!</span>
            </div>
            <Field label="Your Name"><TxtInput value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Dr. Sharma" autoFocus/></Field>
            <Field label="Teacher ID (min 4 chars)"><TxtInput value={id} onChange={e=>setId(e.target.value)} placeholder="e.g. sharma2024"/></Field>
            <Field label="Password (min 6 chars)"><PwdInput value={pw} onChange={e=>setPw(e.target.value)} show={show} toggleShow={()=>setShow(s=>!s)}/></Field>
            <Field label="Confirm Password"><PwdInput value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} show={show} toggleShow={()=>setShow(s=>!s)}/></Field>
            <ErrMsg msg={err}/>
            <div style={{marginTop:"1.1rem"}}><PBtn onClick={submit} full>Create Account →</PBtn></div>
            <Credit/>
          </Card>
        </div>
      </Wrap>;
    }

    // ═══════════════════════════════════════════════════════════════
    // LOGIN
    // ═══════════════════════════════════════════════════════════════
    function Login({onLogin,onStudentView}){
      const [id,setId]=useState("");
      const [pw,setPw]=useState("");
      const [show,setShow]=useState(false);
      const [err,setErr]=useState("");
      const teacher=loadTeacher();

      function submit(){
        setErr("");
        if(!id.trim()||!pw) return setErr("Please fill in both fields.");
        const t=loadTeacher();
        if(t&&id.trim()===t.id&&pw===t.password) onLogin(t);
        else setErr("Invalid Teacher ID or password.");
      }

      return <Wrap>
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem 1.2rem"}}>
          <Card style={{width:"100%",maxWidth:400}}>
            <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
              <div style={{width:52,height:52,borderRadius:14,background:"linear-gradient(135deg,#63b3ed,#4fd1c5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,margin:"0 auto 0.85rem",boxShadow:"0 0 20px rgba(99,179,237,0.35)"}}>🎓</div>
              <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:"1.55rem",fontWeight:800,color:"#e2e8f0",marginBottom:"0.25rem"}}>
                {teacher?`Welcome, ${teacher.name.split(" ")[0]}!`:"Teacher Login"}
              </h2>
              <p style={{color:"rgba(226,232,240,0.32)",fontSize:"0.84rem"}}>AttendX — Smart Attendance System</p>
            </div>
            <Field label="Teacher ID"><TxtInput value={id} onChange={e=>setId(e.target.value)} placeholder="Enter your teacher ID" onKeyDown={e=>e.key==="Enter"&&submit()} autoFocus/></Field>
            <Field label="Password"><PwdInput value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} show={show} toggleShow={()=>setShow(s=>!s)}/></Field>
            <ErrMsg msg={err}/>
            <div style={{marginTop:"1.1rem",display:"flex",flexDirection:"column",gap:"0.55rem"}}>
              <PBtn onClick={submit} full>Sign In →</PBtn>
              <GBtn onClick={onStudentView} full>🎓 Student View — Check My Attendance</GBtn>
            </div>
            <Credit/>
          </Card>
        </div>
      </Wrap>;
    }

    // ═══════════════════════════════════════════════════════════════
    // DASHBOARD
    // ═══════════════════════════════════════════════════════════════
    function Dashboard({teacher,onOpenClass,onLogout}){
      const [classes,setClasses]=useState(()=>loadClasses());
      const [showForm,setShowForm]=useState(false);
      const [newName,setNewName]=useState("");
      const [err,setErr]=useState("");

      function createClass(){
        setErr("");
        if(!newName.trim()) return setErr("Enter a class name.");
        const c={id:Date.now().toString(),name:newName.trim(),code:genCode(),students:[],attendance:{},holidays:[]};
        const updated=[...classes,c];
        setClasses(updated);saveClasses(updated);
        setNewName("");setShowForm(false);
      }
      function deleteClass(cid){
        if(!window.confirm("Delete this class? All data will be lost.")) return;
        const updated=classes.filter(c=>c.id!==cid);
        setClasses(updated);saveClasses(updated);
      }

      return <Wrap>
        <Topbar left={null} right={<>
          <span style={{fontSize:"0.83rem",color:"rgba(226,232,240,0.5)"}}>👤 {teacher.name}</span>
          <button onClick={onLogout} style={{background:"rgba(252,129,129,0.08)",border:"1px solid rgba(252,129,129,0.2)",borderRadius:8,padding:"5px 13px",color:"#fc8181",fontSize:"0.8rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Logout</button>
        </>}/>
        <div style={{maxWidth:960,margin:"0 auto",padding:"1.6rem 1.2rem"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.4rem",flexWrap:"wrap",gap:"0.75rem"}}>
            <div>
              <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:"1.55rem",fontWeight:800,color:"#e2e8f0"}}>My Classes</h1>
              <p style={{color:"rgba(226,232,240,0.32)",fontSize:"0.83rem",marginTop:2}}>{classes.length} class{classes.length!==1?"es":""} · tap to open</p>
            </div>
            <PBtn onClick={()=>{setShowForm(true);setErr("");setNewName("");}}>+ New Class</PBtn>
          </div>

          {showForm&&<Card style={{marginBottom:"1.1rem",borderColor:"rgba(99,179,237,0.25)"}}>
            <div style={{fontSize:"0.75rem",fontWeight:600,color:"rgba(226,232,240,0.4)",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:5}}>Class Name</div>
            <div style={{display:"flex",gap:"0.55rem",flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:180}}><TxtInput value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. BSc CS 3rd Year" onKeyDown={e=>e.key==="Enter"&&createClass()} autoFocus/></div>
              <PBtn onClick={createClass}>Create</PBtn>
              <GBtn onClick={()=>setShowForm(false)}>Cancel</GBtn>
            </div>
            <ErrMsg msg={err}/>
          </Card>}

          {classes.length===0?<div style={{textAlign:"center",padding:"4rem 2rem",color:"rgba(226,232,240,0.28)"}}>
            <div style={{fontSize:"3rem",marginBottom:"0.7rem"}}>📚</div>
            <p style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"1rem",color:"rgba(226,232,240,0.42)"}}>No classes yet</p>
            <p style={{fontSize:"0.83rem",marginTop:4}}>Click "+ New Class" to get started</p>
          </div>:
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(265px,1fr))",gap:"1rem"}}>
            {classes.map(cls=>{
              const hols=new Set(cls.holidays||[]);
              const days=Object.keys(cls.attendance||{}).filter(d=>!hols.has(d)).length;
              return <div key={cls.id} onClick={()=>onOpenClass(cls.id)}
                style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(99,179,237,0.12)",borderRadius:14,padding:"1.25rem",cursor:"pointer",transition:"all 0.22s",position:"relative"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(99,179,237,0.35)";e.currentTarget.style.transform="translateY(-3px)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(99,179,237,0.12)";e.currentTarget.style.transform="translateY(0)";}}
              >
                <button onClick={e=>{e.stopPropagation();deleteClass(cls.id);}} style={{position:"absolute",top:10,right:10,background:"transparent",border:"none",cursor:"pointer",color:"rgba(252,129,129,0.4)",fontSize:"0.95rem",padding:4,borderRadius:6,transition:"color 0.2s"}}
                  onMouseEnter={e=>e.currentTarget.style.color="#fc8181"}
                  onMouseLeave={e=>e.currentTarget.style.color="rgba(252,129,129,0.4)"}
                >🗑</button>
                <h3 style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"1rem",color:"#e2e8f0",marginBottom:"0.45rem",paddingRight:"1.5rem"}}>{cls.name}</h3>
                <div style={{display:"inline-flex",alignItems:"center",gap:5,background:"rgba(99,179,237,0.08)",border:"1px solid rgba(99,179,237,0.16)",borderRadius:6,padding:"2px 10px",marginBottom:"0.7rem"}}>
                  <span style={{fontSize:"0.69rem",color:"rgba(99,179,237,0.55)",letterSpacing:"0.08em"}}>CODE</span>
                  <span style={{fontSize:"0.82rem",fontWeight:700,color:"#63b3ed",letterSpacing:"0.1em"}}>{cls.code}</span>
                </div>
                <div style={{display:"flex",gap:"0.55rem",flexWrap:"wrap"}}>
                  <span style={{background:"rgba(255,255,255,0.04)",borderRadius:7,padding:"3px 10px",fontSize:"0.79rem",color:"rgba(226,232,240,0.5)"}}>👥 {cls.students.length}</span>
                  <span style={{background:"rgba(255,255,255,0.04)",borderRadius:7,padding:"3px 10px",fontSize:"0.79rem",color:"rgba(226,232,240,0.5)"}}>📅 {days} days</span>
                </div>
              </div>;
            })}
          </div>}
        </div>
      </Wrap>;
    }

    // ═══════════════════════════════════════════════════════════════
    // CLASS PAGE
    // ═══════════════════════════════════════════════════════════════
    function ClassPage({classId,onBack}){
      const [classes,setClasses]=useState(()=>loadClasses());
      const [tab,setTab]=useState("students");
      const [tick,setTick]=useState(0);

      function updateCls(patch){
        const updated=classes.map(c=>c.id===classId?{...c,...patch}:c);
        setClasses(updated);saveClasses(updated);setTick(t=>t+1);
      }

      const cls=classes.find(c=>c.id===classId);
      if(!cls) return <Wrap><div style={{padding:"2rem",color:"rgba(226,232,240,0.4)"}}>Class not found.</div></Wrap>;

      // Students
      const [newStu,setNewStu]=useState("");
      const [stuErr,setStuErr]=useState("");
      const [stuOk,setStuOk]=useState("");
      const [moveId,setMoveId]=useState(null);

      function addStudent(){
        setStuErr("");setStuOk("");
        const n=newStu.trim();
        if(!n) return setStuErr("Enter student name.");
        if(cls.students.find(s=>s.name.toLowerCase()===n.toLowerCase())) return setStuErr("Student already exists.");
        const s={id:Date.now().toString(),name:n};
        updateCls({students:[...cls.students,s]});
        setNewStu("");setStuOk(`${n} added!`);
        setTimeout(()=>setStuOk(""),2500);
      }
      function removeStudent(sid){
        if(!window.confirm("Remove this student?")) return;
        const students=cls.students.filter(s=>s.id!==sid);
        const att={...cls.attendance};
        Object.keys(att).forEach(d=>{if(att[d]){att[d]={...att[d]};delete att[d][sid];}});
        updateCls({students,attendance:att});
      }
      function moveStudent(sid,targetId){
        const student=cls.students.find(s=>s.id===sid);
        const updated=classes.map(c=>{
          if(c.id===classId) return {...c,students:c.students.filter(s=>s.id!==sid)};
          if(c.id===targetId) return {...c,students:[...c.students,student]};
          return c;
        });
        setClasses(updated);saveClasses(updated);setMoveId(null);setTick(t=>t+1);
      }

      // Attendance
      const [selDate,setSelDate]=useState(todayStr());
      const [temp,setTemp]=useState({});
      const [saved,setSaved]=useState(false);

      useEffect(()=>{
        const existing=(cls.attendance||{})[selDate]||{};
        setTemp({...existing});setSaved(false);
      },[selDate,classId,tick]);

      const isHol=(cls.holidays||[]).includes(selDate);
      function toggleHoliday(){
        const h=cls.holidays||[];
        updateCls({holidays:isHol?h.filter(d=>d!==selDate):[...h,selDate]});
      }
      function saveAtt(){
        updateCls({attendance:{...(cls.attendance||{}),[selDate]:{...temp}}});
        setSaved(true);setTimeout(()=>setSaved(false),2200);
      }

      const presentCount=Object.values(temp).filter(Boolean).length;
      const TABS=[{k:"students",l:"👥 Students"},{k:"attendance",l:"✅ Attendance"},{k:"history",l:"📅 History"}];

      return <Wrap>
        <Topbar
          left={<>
            <button onClick={onBack} style={{background:"rgba(99,179,237,0.08)",border:"1px solid rgba(99,179,237,0.2)",borderRadius:8,padding:"5px 12px",color:"#63b3ed",fontSize:"0.83rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>← Back</button>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.96rem",color:"#e2e8f0"}}>{cls.name}</div>
              <div style={{fontSize:"0.71rem",color:"rgba(99,179,237,0.6)",letterSpacing:"0.08em"}}>CODE: {cls.code}</div>
            </div>
          </>}
          right={<span style={{fontSize:"0.82rem",color:"rgba(226,232,240,0.42)"}}>👥 {cls.students.length}</span>}
        />

        <div style={{display:"flex",gap:"0.4rem",padding:"1.1rem 1.2rem 0",maxWidth:880,margin:"0 auto"}}>
          {TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"7px 15px",borderRadius:9,fontSize:"0.85rem",fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all 0.18s",background:tab===t.k?"linear-gradient(135deg,#63b3ed,#4fd1c5)":"rgba(255,255,255,0.04)",border:tab===t.k?"none":"1px solid rgba(99,179,237,0.12)",color:tab===t.k?"#0a0a14":"rgba(226,232,240,0.48)"}}>{t.l}</button>)}
        </div>

        <div style={{maxWidth:880,margin:"0 auto",padding:"1.1rem 1.2rem"}}>

          {tab==="students"&&<div className="fu">
            <Card style={{marginBottom:"1rem"}}>
              <div style={{fontSize:"0.75rem",fontWeight:600,color:"rgba(226,232,240,0.4)",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:6}}>Add Student</div>
              <div style={{display:"flex",gap:"0.55rem",flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:180}}><TxtInput value={newStu} onChange={e=>setNewStu(e.target.value)} placeholder="Student full name" onKeyDown={e=>e.key==="Enter"&&addStudent()} autoFocus/></div>
                <PBtn onClick={addStudent}>Add</PBtn>
              </div>
              <ErrMsg msg={stuErr}/><OkMsg msg={stuOk}/>
            </Card>
            {cls.students.length===0?<div style={{textAlign:"center",padding:"2.5rem",color:"rgba(226,232,240,0.28)"}}>
              <div style={{fontSize:"2.5rem",marginBottom:"0.5rem"}}>👤</div><p>No students yet. Add above!</p>
            </div>:
            <Card>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.93rem",color:"#e2e8f0",marginBottom:"0.85rem"}}>Students ({cls.students.length})</div>
              <div style={{display:"flex",flexDirection:"column",gap:"0.42rem"}}>
                {cls.students.map((s,i)=>{
                  const pct=calcPct(s.id,cls.attendance,cls.holidays);
                  const grade=getGrade(pct);
                  return <div key={s.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:"rgba(255,255,255,0.03)",borderRadius:10,border:"1px solid rgba(99,179,237,0.07)",flexWrap:"wrap",gap:7}}>
                    <div style={{display:"flex",alignItems:"center",gap:9}}>
                      <span style={{width:25,height:25,borderRadius:"50%",background:"rgba(99,179,237,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.72rem",fontWeight:700,color:"#63b3ed",flexShrink:0}}>{i+1}</span>
                      <span style={{fontWeight:500,color:"#e2e8f0",fontSize:"0.9rem"}}>{s.name}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      {grade?<span style={{background:grade.bg,border:`1px solid ${grade.border}`,borderRadius:6,padding:"2px 9px",fontSize:"0.77rem",fontWeight:600,color:grade.color}}>{pct}%</span>
                        :<span style={{fontSize:"0.74rem",color:"rgba(226,232,240,0.25)"}}>No data</span>}
                      {classes.length>1&&<button onClick={()=>setMoveId(s.id)} style={{background:"rgba(99,179,237,0.08)",border:"1px solid rgba(99,179,237,0.18)",borderRadius:7,padding:"3px 9px",color:"#63b3ed",fontSize:"0.74rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Move</button>}
                      <button onClick={()=>removeStudent(s.id)} style={{background:"transparent",border:"none",cursor:"pointer",color:"rgba(252,129,129,0.5)",fontSize:"0.85rem",padding:"2px 5px",borderRadius:6}}
                        onMouseEnter={e=>e.currentTarget.style.color="#fc8181"}
                        onMouseLeave={e=>e.currentTarget.style.color="rgba(252,129,129,0.5)"}
                      >✕</button>
                    </div>
                  </div>;
                })}
              </div>
            </Card>}
          </div>}

          {tab==="attendance"&&<div className="fu">
            <Card style={{marginBottom:"1rem"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"0.75rem"}}>
                <div>
                  <div style={{fontSize:"0.75rem",fontWeight:600,color:"rgba(226,232,240,0.4)",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:5}}>Date</div>
                  <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(99,179,237,0.2)",borderRadius:9,padding:"8px 12px",color:"#e2e8f0",fontSize:"0.9rem",fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                </div>
                <button onClick={toggleHoliday} style={{background:isHol?"rgba(236,201,75,0.12)":"rgba(255,255,255,0.04)",border:`1px solid ${isHol?"rgba(236,201,75,0.35)":"rgba(99,179,237,0.18)"}`,borderRadius:9,padding:"8px 14px",color:isHol?"#ecc94b":"rgba(226,232,240,0.42)",fontWeight:600,fontSize:"0.84rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                  {isHol?"🏖️ Holiday (tap to remove)":"🏖️ Mark Holiday"}
                </button>
              </div>
              {isHol&&<div style={{marginTop:"0.7rem",background:"rgba(236,201,75,0.08)",border:"1px solid rgba(236,201,75,0.2)",borderRadius:9,padding:"8px 12px",color:"#ecc94b",fontSize:"0.82rem"}}>Holiday — not counted in attendance %</div>}
            </Card>
            {!isHol&&cls.students.length===0&&<div style={{textAlign:"center",padding:"2rem",color:"rgba(226,232,240,0.28)",fontSize:"0.87rem"}}>Add students first from the Students tab.</div>}
            {!isHol&&cls.students.length>0&&<>
              <div style={{display:"flex",gap:"0.5rem",marginBottom:"0.75rem",flexWrap:"wrap",alignItems:"center"}}>
                <button onClick={()=>{const a={};cls.students.forEach(s=>a[s.id]=true);setTemp(a);}} style={{background:"rgba(72,187,120,0.1)",border:"1px solid rgba(72,187,120,0.24)",borderRadius:8,padding:"6px 13px",color:"#48bb78",fontSize:"0.81rem",fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>✅ All Present</button>
                <button onClick={()=>setTemp({})} style={{background:"rgba(252,129,129,0.1)",border:"1px solid rgba(252,129,129,0.24)",borderRadius:8,padding:"6px 13px",color:"#fc8181",fontSize:"0.81rem",fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>❌ All Absent</button>
                <div style={{marginLeft:"auto",display:"flex",gap:10,fontSize:"0.82rem"}}>
                  <span style={{color:"#48bb78"}}>✅ {presentCount}</span>
                  <span style={{color:"#fc8181"}}>❌ {cls.students.length-presentCount}</span>
                </div>
              </div>
              <Card style={{marginBottom:"1rem"}}>
                <div style={{display:"flex",flexDirection:"column",gap:"0.38rem"}}>
                  {cls.students.map((s,i)=>{
                    const isP=temp[s.id]===true;
                    const pct=calcPct(s.id,cls.attendance,cls.holidays);
                    const grade=getGrade(pct);
                    return <div key={s.id} onClick={()=>setTemp(prev=>({...prev,[s.id]:!prev[s.id]}))}
                      style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:isP?"rgba(72,187,120,0.07)":"rgba(255,255,255,0.02)",border:`1px solid ${isP?"rgba(72,187,120,0.2)":"rgba(99,179,237,0.07)"}`,borderRadius:10,cursor:"pointer",userSelect:"none",transition:"all 0.13s"}}>
                      <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${isP?"#48bb78":"rgba(226,232,240,0.18)"}`,background:isP?"#48bb78":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.13s"}}>
                        {isP&&<span style={{color:"#0a0a14",fontSize:11,fontWeight:900}}>✓</span>}
                      </div>
                      <span style={{fontSize:"0.73rem",color:"rgba(226,232,240,0.3)",width:18,flexShrink:0}}>{i+1}</span>
                      <span style={{flex:1,fontWeight:500,fontSize:"0.9rem",color:isP?"#e2e8f0":"rgba(226,232,240,0.48)"}}>{s.name}</span>
                      {grade&&<span style={{fontSize:"0.75rem",fontWeight:700,color:grade.color,background:grade.bg,border:`1px solid ${grade.border}`,borderRadius:6,padding:"2px 8px",flexShrink:0}}>{pct}%</span>}
                      <span style={{fontSize:"0.78rem",fontWeight:600,color:isP?"#48bb78":"#fc8181",flexShrink:0,minWidth:50,textAlign:"right"}}>{isP?"Present":"Absent"}</span>
                    </div>;
                  })}
                </div>
              </Card>
              <PBtn onClick={saveAtt} full>{saved?"✅ Saved!":"Save Attendance"}</PBtn>
            </>}
          </div>}

          {tab==="history"&&<div className="fu">
            {cls.students.length===0?<div style={{textAlign:"center",padding:"2.5rem",color:"rgba(226,232,240,0.28)"}}>No students yet.</div>:
            <>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:"0.7rem",marginBottom:"1.2rem"}}>
                {cls.students.map((s,i)=>{
                  const pct=calcPct(s.id,cls.attendance,cls.holidays);
                  const grade=getGrade(pct);
                  const hols=new Set(cls.holidays||[]);
                  const days=Object.keys(cls.attendance||{}).filter(d=>!hols.has(d));
                  const presentDays=days.filter(d=>cls.attendance[d]?.[s.id]);
                  return <div key={s.id} style={{background:grade?grade.bg:"rgba(255,255,255,0.03)",border:`1px solid ${grade?grade.border:"rgba(99,179,237,0.1)"}`,borderRadius:12,padding:"0.95rem"}}>
                    <div style={{fontSize:"0.68rem",color:"rgba(226,232,240,0.3)",marginBottom:3}}>#{i+1}</div>
                    <div style={{fontWeight:600,fontSize:"0.88rem",color:"#e2e8f0",marginBottom:5,wordBreak:"break-word"}}>{s.name}</div>
                    {grade?<>
                      <div style={{fontSize:"1.45rem",fontWeight:800,fontFamily:"'Syne',sans-serif",color:grade.color}}>{pct}%</div>
                      <div style={{fontSize:"0.72rem",color:grade.color,fontWeight:600,marginTop:1}}>{grade.label}</div>
                      <div style={{fontSize:"0.7rem",color:"rgba(226,232,240,0.35)",marginTop:4}}>{presentDays.length}/{days.length} days</div>
                    </>:<div style={{fontSize:"0.78rem",color:"rgba(226,232,240,0.25)"}}>No data</div>}
                  </div>;
                })}
              </div>
              {Object.keys(cls.attendance||{}).length>0&&<Card>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.93rem",color:"#e2e8f0",marginBottom:"0.8rem"}}>Date-wise Record</div>
                <div style={{display:"flex",flexDirection:"column",gap:"0.38rem"}}>
                  {Object.keys(cls.attendance).sort((a,b)=>b.localeCompare(a)).map(date=>{
                    const hol=(cls.holidays||[]).includes(date);
                    const rec=cls.attendance[date]||{};
                    const p=cls.students.filter(s=>rec[s.id]).length;
                    return <div key={date} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 11px",background:"rgba(255,255,255,0.02)",borderRadius:9,flexWrap:"wrap",gap:6}}>
                      <span style={{fontWeight:600,color:"#e2e8f0",fontSize:"0.85rem"}}>{date}</span>
                      {hol?<span style={{background:"rgba(236,201,75,0.09)",border:"1px solid rgba(236,201,75,0.22)",borderRadius:6,padding:"2px 9px",color:"#ecc94b",fontSize:"0.75rem"}}>🏖️ Holiday</span>:
                      <div style={{display:"flex",gap:6}}>
                        <span style={{background:"rgba(72,187,120,0.09)",border:"1px solid rgba(72,187,120,0.22)",borderRadius:6,padding:"2px 9px",color:"#48bb78",fontSize:"0.75rem"}}>✅ {p}</span>
                        <span style={{background:"rgba(252,129,129,0.09)",border:"1px solid rgba(252,129,129,0.22)",borderRadius:6,padding:"2px 9px",color:"#fc8181",fontSize:"0.75rem"}}>❌ {cls.students.length-p}</span>
                      </div>}
                    </div>;
                  })}
                </div>
              </Card>}
            </>}
          </div>}
        </div>

        {moveId&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"1.5rem"}} onClick={()=>setMoveId(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#13131f",border:"1px solid rgba(99,179,237,0.25)",borderRadius:15,padding:"1.4rem",width:"100%",maxWidth:340}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,color:"#e2e8f0",marginBottom:"0.4rem",fontSize:"1rem"}}>Move Student</div>
            <p style={{color:"rgba(226,232,240,0.38)",fontSize:"0.83rem",marginBottom:"1rem"}}>Move <b style={{color:"#e2e8f0"}}>{cls.students.find(s=>s.id===moveId)?.name}</b> to:</p>
            <div style={{display:"flex",flexDirection:"column",gap:"0.45rem",marginBottom:"0.85rem"}}>
              {classes.filter(c=>c.id!==classId).map(c=><button key={c.id} onClick={()=>moveStudent(moveId,c.id)}
                style={{padding:"10px 13px",background:"rgba(99,179,237,0.07)",border:"1px solid rgba(99,179,237,0.16)",borderRadius:9,color:"#e2e8f0",fontSize:"0.88rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",textAlign:"left",transition:"all 0.18s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(99,179,237,0.14)";e.currentTarget.style.color="#63b3ed";}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(99,179,237,0.07)";e.currentTarget.style.color="#e2e8f0";}}
              >{c.name}</button>)}
            </div>
            <GBtn onClick={()=>setMoveId(null)} full>Cancel</GBtn>
          </div>
        </div>}
      </Wrap>;
    }

    // ═══════════════════════════════════════════════════════════════
    // STUDENT VIEW
    // ═══════════════════════════════════════════════════════════════
    function StudentView({onBack}){
      const [code,setCode]=useState("");
      const [name,setName]=useState("");
      const [result,setResult]=useState(null);
      const [err,setErr]=useState("");

      function search(){
        setErr("");setResult(null);
        const classes=loadClasses();
        const cls=classes.find(c=>c.code===code.trim().toUpperCase());
        if(!cls) return setErr("Class code not found. Please check and try again.");
        const student=cls.students.find(s=>s.name.toLowerCase()===name.trim().toLowerCase());
        if(!student) return setErr("Name not found. Enter exact name as registered.");
        const pct=calcPct(student.id,cls.attendance,cls.holidays);
        const grade=getGrade(pct);
        const hols=new Set(cls.holidays||[]);
        const allDays=Object.keys(cls.attendance||{}).filter(d=>!hols.has(d)).sort((a,b)=>b.localeCompare(a));
        const presentDays=allDays.filter(d=>cls.attendance[d]?.[student.id]);
        setResult({cls,student,pct,grade,allDays,presentDays});
      }

      return <Wrap>
        <div style={{maxWidth:480,margin:"0 auto",padding:"2rem 1.2rem"}}>
          <button onClick={onBack} style={{background:"rgba(99,179,237,0.08)",border:"1px solid rgba(99,179,237,0.2)",borderRadius:8,padding:"5px 12px",color:"#63b3ed",fontSize:"0.83rem",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",marginBottom:"1.2rem"}}>← Back to Login</button>
          <Card style={{marginBottom:"1rem"}}>
            <div style={{textAlign:"center",marginBottom:"1.2rem"}}>
              <div style={{fontSize:"2rem",marginBottom:"0.4rem"}}>🎓</div>
              <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1.3rem",color:"#e2e8f0",marginBottom:"0.2rem"}}>Check Your Attendance</h2>
              <p style={{color:"rgba(226,232,240,0.32)",fontSize:"0.83rem"}}>Enter class code & your exact name</p>
            </div>
            <Field label="Class Code"><TxtInput value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="e.g. ABC123" autoFocus/></Field>
            <Field label="Your Full Name (exact)"><TxtInput value={name} onChange={e=>setName(e.target.value)} placeholder="Enter your full name" onKeyDown={e=>e.key==="Enter"&&search()}/></Field>
            <ErrMsg msg={err}/>
            <div style={{marginTop:"1rem"}}><PBtn onClick={search} full>Check Attendance →</PBtn></div>
          </Card>

          {result&&<div className="fu">
            <Card style={{borderColor:result.grade?.border||"rgba(99,179,237,0.2)",marginBottom:"1rem"}}>
              <div style={{textAlign:"center",marginBottom:"1rem"}}>
                <div style={{fontSize:"0.83rem",color:"rgba(226,232,240,0.4)",marginBottom:2}}>{result.cls.name}</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.05rem",fontWeight:800,color:"#e2e8f0",marginBottom:"0.7rem"}}>{result.student.name}</div>
                {result.pct!==null?<>
                  <div style={{fontSize:"2.8rem",fontWeight:800,fontFamily:"'Syne',sans-serif",color:result.grade?.color}}>{result.pct}%</div>
                  <div style={{display:"inline-block",background:result.grade?.bg,border:`1px solid ${result.grade?.border}`,borderRadius:8,padding:"3px 12px",color:result.grade?.color,fontWeight:700,fontSize:"0.84rem",marginTop:"0.4rem"}}>{result.grade?.label}</div>
                </>:<div style={{color:"rgba(226,232,240,0.28)"}}>No attendance data yet</div>}
              </div>
              <div style={{display:"flex",gap:"0.55rem",justifyContent:"center"}}>
                {[
                  {v:result.presentDays.length,l:"Present",c:"#48bb78",bg:"rgba(72,187,120,0.1)",b:"rgba(72,187,120,0.24)"},
                  {v:result.allDays.length-result.presentDays.length,l:"Absent",c:"#fc8181",bg:"rgba(252,129,129,0.1)",b:"rgba(252,129,129,0.24)"},
                  {v:result.allDays.length,l:"Total Days",c:"#63b3ed",bg:"rgba(99,179,237,0.1)",b:"rgba(99,179,237,0.24)"},
                ].map(x=><div key={x.l} style={{background:x.bg,border:`1px solid ${x.b}`,borderRadius:9,padding:"7px 12px",textAlign:"center",flex:1}}>
                  <div style={{fontSize:"1.1rem",fontWeight:700,color:x.c}}>{x.v}</div>
                  <div style={{fontSize:"0.71rem",color:"rgba(226,232,240,0.38)"}}>{x.l}</div>
                </div>)}
              </div>
            </Card>
            {result.allDays.length>0&&<Card>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.92rem",color:"#e2e8f0",marginBottom:"0.7rem"}}>Attendance History</div>
              <div style={{display:"flex",flexDirection:"column",gap:"0.32rem"}}>
                {result.allDays.map(d=>{
                  const p=result.presentDays.includes(d);
                  return <div key={d} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",background:"rgba(255,255,255,0.02)",borderRadius:8}}>
                    <span style={{fontSize:"0.83rem",color:"rgba(226,232,240,0.52)"}}>{d}</span>
                    <span style={{fontSize:"0.78rem",fontWeight:600,color:p?"#48bb78":"#fc8181"}}>{p?"✅ Present":"❌ Absent"}</span>
                  </div>;
                })}
              </div>
            </Card>}
          </div>}
        </div>
      </Wrap>;
    }

    // ═══════════════════════════════════════════════════════════════
    // APP ROOT
    // ═══════════════════════════════════════════════════════════════
    function App(){
      const [page,setPage]=useState(null);
      const [teacher,setTeacher]=useState(null);
      const [openClass,setOpenClass]=useState(null);

      useEffect(()=>{
        const t=loadTeacher();
        if(!t) setPage("setup");
        else{setTeacher(t);setPage("login");}
      },[]);

      if(!page) return <div style={{minHeight:"100vh",background:"#0a0a14",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{color:"rgba(99,179,237,0.45)",fontFamily:"'DM Sans',sans-serif"}}>Loading…</span>
      </div>;

      if(page==="setup")   return <Setup onDone={t=>{setTeacher(t);setPage("login");}}/>;
      if(page==="login")   return <Login onLogin={t=>{setTeacher(t);setPage("dashboard");}} onStudentView={()=>setPage("student")}/>;
      if(page==="student") return <StudentView onBack={()=>setPage("login")}/>;
      if(page==="dashboard") return <Dashboard teacher={teacher} onOpenClass={id=>{setOpenClass(id);setPage("class");}} onLogout={()=>{setTeacher(null);setPage("login");}}/>;
      if(page==="class")   return <ClassPage classId={openClass} onBack={()=>setPage("dashboard")}/>;
      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
