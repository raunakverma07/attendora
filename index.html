<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04060f;font-family:'DM Sans',sans-serif;color:#e8eaf0;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#00d4ff;border-radius:2px}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:orbf 20s ease-in-out infinite}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(0,212,255,0.10),transparent 70%);top:-5%;left:-10%}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(155,92,255,0.09),transparent 70%);top:40%;right:-8%;animation-duration:24s}
.orb3{width:350px;height:350px;background:radial-gradient(circle,rgba(255,0,128,0.06),transparent 70%);bottom:5%;left:15%;animation-duration:17s}
#app{position:relative;z-index:1;min-height:100vh}
@keyframes orbf{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-40px)}66%{transform:translate(-30px,30px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.topbar{height:60px;background:rgba(4,6,15,0.92);border-bottom:1px solid rgba(0,212,255,0.1);backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;position:sticky;top:0;z-index:100}

.fld{margin-bottom:0.9rem}

input[type=date]{background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.18);border-radius:9px;padding:8px 12px;color:#e8eaf0;font-size:0.9rem;outline:none;font-family:'DM Sans',sans-serif}

// ── UTILS ──
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const code6=()=>Math.random().toString(36).slice(2,8).toUpperCase();

const el=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e;};
const pct=(sid,att,hols)=>{
  const h=new Set(hols||[]);
  const days=Object.keys(att||{}).filter(d=>!h.has(d));
  if(!days.length)return null;
  return Math.round(days.filter(d=>(att[d]||{})[sid]).length/days.length*100);
};
const grade=p=>{
  if(p===null)return null;
  if(p>=85)return{c:"#39ff14",bg:"rgba(57,255,20,0.1)",b:"rgba(57,255,20,0.3)",t:"Safe 🟢"};
  if(p>=65)return{c:"#ffd60a",bg:"rgba(255,214,10,0.1)",b:"rgba(255,214,10,0.3)",t:"Average 🟡"};
  if(p>=40)return{c:"#ff9500",bg:"rgba(255,149,0,0.1)",b:"rgba(255,149,0,0.3)",t:"Danger 🟠"};
  return{c:"#ff453a",bg:"rgba(255,69,58,0.1)",b:"rgba(255,69,58,0.3)",t:"Critical 🔴"};
};

// ── FIREBASE OPS ──
const FB={
  async getTeacher(id){const s=await db.collection("teachers").doc(id).get();return s.exists?s.data():null;},
  async saveTeacher(t){await db.collection("teachers").doc(t.id).set(t);},
  async saveClass(tid,cls){await db.collection("teachers").doc(tid).collection("classes").doc(cls.id).set(cls);},
  async deleteClass(tid,cid){await db.collection("teachers").doc(tid).collection("classes").doc(cid).delete();},
  watchClasses(tid,cb){return db.collection("teachers").doc(tid).collection("classes").onSnapshot(s=>cb(s.docs.map(d=>d.data())));},
  async getAllClasses(){
    const ts=await db.collection("teachers").get();
    let all=[];
    for(const t of ts.docs){const cs=await db.collection("teachers").doc(t.id).collection("classes").get();all=[...all,...cs.docs.map(d=>d.data())];}
    return all;
  }
};

// ── STATE ──
let state={page:"landing",teacher:null,openCls:null,openTid:null,unsub:null};
function nav(page,extra={}){
  if(state.unsub){state.unsub();state.unsub=null;}
  state={...state,page,...extra};
  render();
}

  const tabs=[["students","👥 Students"],["attendance","✅ Attendance"],["summary","📊 Summary"],["datesearch","📅 Date Search"]];
  const tb=$("cls-tabs");
  if(tb)tb.innerHTML=tabs.map(t=>`<button class="tab-btn${state._activeTab===t[0]?' active':''}" onclick="setTab('${t[0]}')">${t[1]}</button>`).join("");
  renderTabBody(cls,allCls);
}
function setTab(t){state._activeTab=t;if(state._cls)renderClassTabs(state._cls,state._classes||[]);}
function showToast(){const t=$("saving-toast");if(t){t.style.display="block";setTimeout(()=>t.style.display="none",1500);}}
async function saveClass(patch){
  const cls=state._cls;if(!cls)return;
  showToast();
  try{await FB.saveClass(state.teacher.id,{...cls,...patch});}catch{alert("Save failed.");}
}
function renderTabBody(cls,allCls){
  const body=$("cls-body");if(!body)return;
  if(state._activeTab==="students") renderStudents(cls,allCls,body);
  else if(state._activeTab==="attendance") renderAttendance(cls,body);
  else if(state._activeTab==="summary") renderSummary(cls,body);
  else if(state._activeTab==="datesearch") renderDateSearch(cls,body);
}

function renderStudents(cls,allCls,body){
  body.innerHTML=`
  <div class="card neon" style="margin-bottom:1rem">
    <div class="lbl">Add New Student</div>
    <div style="display:flex;gap:0.55rem;flex-wrap:wrap;margin-top:6px">
      <input class="inp" id="ns-inp" placeholder="Student full name" style="flex:1;min-width:180px" autofocus onkeydown="if(event.key==='Enter')addStudent()"/>
      <button class="btn" onclick="addStudent()">Add</button>
    </div>
    <div id="ns-msg"></div>
  </div>
  ${cls.students.length===0?`<div style="text-align:center;padding:2.5rem;color:rgba(232,234,240,0.25)"><div style="font-size:2.5rem;margin-bottom:0.5rem">👤</div><p>No students yet. Add above!</p></div>`:`
  <div class="card">
    <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.93rem;margin-bottom:0.85rem;color:#00d4ff">Students (${cls.students.length})</div>
    ${cls.students.map((s,i)=>{const p=pct(s.id,cls.att,cls.hols);const g=grade(p);return`
    <div class="stu-row">
      <div style="display:flex;align-items:center;gap:9px">
        <span style="width:25px;height:25px;border-radius:50%;background:rgba(0,212,255,0.1);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:#00d4ff;flex-shrink:0">${i+1}</span>
        <span style="font-weight:500;font-size:0.9rem">${s.name}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${g?`<span style="background:${g.bg};border:1px solid ${g.b};border-radius:6px;padding:2px 9px;font-size:0.77rem;font-weight:600;color:${g.c}">${p}%</span>`:`<span style="font-size:0.74rem;color:rgba(232,234,240,0.25)">No data</span>`}
        ${allCls.length>1?`<button onclick="moveStudent('${s.id}')" style="background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.2);border-radius:7px;padding:3px 9px;color:#00d4ff;font-size:0.74rem;cursor:pointer">Move</button>`:""}
        <button onclick="removeStudent('${s.id}')" style="background:transparent;border:none;cursor:pointer;color:rgba(255,69,58,0.45);font-size:0.9rem;padding:2px 5px;border-radius:6px" onmouseover="this.style.color='#ff453a'" onmouseout="this.style.color='rgba(255,69,58,0.45)'">✕</button>
      </div>
    </div>`;}).join("")}
  </div>`}`;
}
async function addStudent(){
  const inp=$("ns-inp"),msg=$("ns-msg");if(!inp)return;
  const n=inp.value.trim();msg.innerHTML="";
  if(!n)return msg.innerHTML=`<div class="err">⚠️ Enter student name.</div>`;
  const cls=state._cls;
  if(cls.students.find(s=>s.name.toLowerCase()===n.toLowerCase()))return msg.innerHTML=`<div class="err">⚠️ Student already exists.</div>`;
  await saveClass({students:[...cls.students,{id:uid(),name:n}]});
  inp.value="";msg.innerHTML=`<div class="ok">✅ ${n} added!</div>`;setTimeout(()=>{if($("ns-msg"))$("ns-msg").innerHTML="";},2500);inp.focus();
}
async function removeStudent(sid){
  if(!confirm("Remove this student?"))return;
  const cls=state._cls;
  const students=cls.students.filter(s=>s.id!==sid);
  const att={...cls.att};Object.keys(att).forEach(d=>{if(att[d]){att[d]={...att[d]};delete att[d][sid];}});
  await saveClass({students,att});
}
function moveStudent(sid){
  const cls=state._cls,allCls=state._classes||[];
  const others=allCls.filter(c=>c.id!==cls.id);if(!others.length)return;
  const stu=cls.students.find(s=>s.id===sid);
  const modal=document.createElement("div");
  modal.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:200;padding:1.5rem";
  modal.innerHTML=`<div style="background:#0a0c1a;border:1px solid rgba(0,212,255,0.28);border-radius:16px;padding:1.4rem;width:100%;max-width:340px">
    <div style="font-family:'Syne',sans-serif;font-weight:700;color:#00d4ff;margin-bottom:0.4rem">Move Student</div>
    <p style="color:rgba(232,234,240,0.5);font-size:0.83rem;margin-bottom:1rem">Move <b style="color:#e8eaf0">${stu.name}</b> to:</p>
    <div style="display:flex;flex-direction:column;gap:0.45rem;margin-bottom:0.85rem">
      ${others.map(c=>`<button onclick="doMove('${sid}','${c.id}')" style="padding:10px 13px;background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.16);border-radius:9px;color:#e8eaf0;font-size:0.88rem;cursor:pointer;text-align:left" onmouseover="this.style.background='rgba(0,212,255,0.12)';this.style.color='#00d4ff'" onmouseout="this.style.background='rgba(0,212,255,0.05)';this.style.color='#e8eaf0'">${c.name}</button>`).join("")}
    </div>
    <button class="btn ghost full" onclick="this.closest('[style*=fixed]').remove()">Cancel</button>
  </div>`;
  document.body.appendChild(modal);
}
async function doMove(sid,tid2){
  const cls=state._cls,allCls=state._classes||[];
  const stu=cls.students.find(s=>s.id===sid);
  const tgt=allCls.find(c=>c.id===tid2);if(!tgt||!stu)return;
  document.querySelector('[style*="position:fixed"][style*="inset"]')?.remove();
  await FB.saveClass(state.teacher.id,{...cls,students:cls.students.filter(s=>s.id!==sid)});
  await FB.saveClass(state.teacher.id,{...tgt,students:[...tgt.students,stu]});
}

function renderAttendance(cls,body){
  const date=state._date;
  const isHol=(cls.hols||[]).includes(date);
  if(!_attTmp[date]) _attTmp[date]={...((cls.att||{})[date]||{})};
  const tmp=_attTmp[date];
  const pCnt=Object.values(tmp).filter(Boolean).length;
  body.innerHTML=`
  <div class="card neon" style="margin-bottom:1rem">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem">
      <div><div class="lbl">Date</div><input type="date" id="att-date" value="${date}" onchange="state._date=this.value;_attTmp={};setTab('attendance')"/></div>
      <button onclick="toggleHoliday()" style="background:${isHol?'rgba(255,214,10,0.1)':'rgba(255,255,255,0.04)'};border:1px solid ${isHol?'rgba(255,214,10,0.38)':'rgba(0,212,255,0.18)'};border-radius:9px;padding:8px 14px;color:${isHol?'#ffd60a':'rgba(232,234,240,0.5)'};font-weight:600;font-size:0.84rem;cursor:pointer">${isHol?"🏖️ Holiday (tap to remove)":"🏖️ Mark Holiday"}</button>
    </div>
    ${isHol?`<div style="margin-top:0.7rem;background:rgba(255,214,10,0.07);border:1px solid rgba(255,214,10,0.22);border-radius:9px;padding:8px 12px;color:#ffd60a;font-size:0.82rem">Holiday — not counted in attendance %</div>`:""}
  </div>
  ${isHol?"":cls.students.length===0?`<div style="text-align:center;padding:2rem;color:rgba(232,234,240,0.25);font-size:0.87rem">Add students first.</div>`:`
  <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap;align-items:center">
    <button onclick="setAllPresent()" style="background:rgba(57,255,20,0.08);border:1px solid rgba(57,255,20,0.25);border-radius:8px;padding:6px 13px;color:#39ff14;font-size:0.81rem;font-weight:600;cursor:pointer">✅ All Present</button>
    <button onclick="setAllAbsent()" style="background:rgba(255,69,58,0.08);border:1px solid rgba(255,69,58,0.25);border-radius:8px;padding:6px 13px;color:#ff453a;font-size:0.81rem;font-weight:600;cursor:pointer">❌ All Absent</button>
    <div style="margin-left:auto;display:flex;gap:10px;font-size:0.82rem">
      <span style="color:#39ff14">✅ ${pCnt}</span><span style="color:#ff453a">❌ ${cls.students.length-pCnt}</span>
    </div>
  </div>
  <div class="card" style="margin-bottom:1rem">
    ${cls.students.map((s,i)=>{const isP=tmp[s.id]===true;const p=pct(s.id,cls.att,cls.hols);const g=grade(p);return`
    <div class="att-row ${isP?'present':'absent'}" onclick="toggleAtt('${s.id}')">
      <div class="chk ${isP?'on':'off'}">${isP?'<span style="color:#04060f;font-size:11px;font-weight:900">✓</span>':''}</div>
      <span style="font-size:0.73rem;color:rgba(232,234,240,0.25);width:18px;flex-shrink:0">${i+1}</span>
      <span style="flex:1;font-weight:500;font-size:0.9rem;color:${isP?'#e8eaf0':'rgba(232,234,240,0.45)'}">${s.name}</span>
      ${g?`<span style="font-size:0.75rem;font-weight:700;color:${g.c};background:${g.bg};border:1px solid ${g.b};border-radius:6px;padding:2px 8px;flex-shrink:0">${p}%</span>`:""}
      <span style="font-size:0.78rem;font-weight:600;color:${isP?'#39ff14':'#ff453a'};flex-shrink:0;min-width:50px;text-align:right">${isP?"Present":"Absent"}</span>
    </div>`;}).join("")}
  </div>
  <button class="btn full" id="save-att-btn" onclick="doSaveAtt()">Save Attendance ☁️</button>`}`;
}
function toggleAtt(sid){
  const date=state._date;
  if(!_attTmp[date])_attTmp[date]={};
  _attTmp[date][sid]=!_attTmp[date][sid];
  if(state._cls)renderAttendance(state._cls,$("cls-body"));
}
function setAllPresent(){const cls=state._cls;if(!cls)return;const t={};cls.students.forEach(s=>t[s.id]=true);_attTmp[state._date]=t;renderAttendance(cls,$("cls-body"));}
function setAllAbsent(){_attTmp[state._date]={};if(state._cls)renderAttendance(state._cls,$("cls-body"));}
async function toggleHoliday(){
  const cls=state._cls,date=state._date;if(!cls)return;
  const h=cls.hols||[];
  await saveClass({hols:h.includes(date)?h.filter(d=>d!==date):[...h,date]});
}
async function doSaveAtt(){
  const btn=$("save-att-btn");if(btn){btn.disabled=true;btn.innerHTML=`<span class="spinner"></span> Saving...`;}
  await saveClass({att:{...(state._cls.att||{}),[state._date]:{..._attTmp[state._date]||{}}}});
  if(btn){btn.innerHTML="✅ Saved to Cloud!";setTimeout(()=>{if(btn){btn.disabled=false;btn.innerHTML="Save Attendance ☁️";}},2000);}
}

function renderSummary(cls,body){
  if(cls.students.length===0){body.innerHTML=`<div style="text-align:center;padding:2.5rem;color:rgba(232,234,240,0.25)">No students yet.</div>`;return;}
  body.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:0.7rem">
  ${cls.students.map((s,i)=>{
    const p=pct(s.id,cls.att,cls.hols),g=grade(p);
    const hset=new Set(cls.hols||[]);const days=Object.keys(cls.att||{}).filter(d=>!hset.has(d));const pD=days.filter(d=>(cls.att[d]||{})[s.id]);
    return`<div style="background:${g?g.bg:'rgba(255,255,255,0.028)'};border:1px solid ${g?g.b:'rgba(0,212,255,0.14)'};border-radius:12px;padding:1rem">
      <div style="font-size:0.68rem;color:rgba(232,234,240,0.25);margin-bottom:3px">#${i+1}</div>
      <div style="font-weight:600;font-size:0.88rem;margin-bottom:5px;word-break:break-word">${s.name}</div>
      ${g?`<div style="font-size:1.5rem;font-weight:800;font-family:'Syne',sans-serif;color:${g.c};text-shadow:0 0 16px ${g.c}50">${p}%</div><div style="font-size:0.72rem;color:${g.c};font-weight:600;margin-top:1px">${g.t}</div><div style="font-size:0.7rem;color:rgba(232,234,240,0.25);margin-top:4px">${pD.length}/${days.length} days</div>`:`<div style="font-size:0.78rem;color:rgba(232,234,240,0.25)">No data</div>`}
    </div>`;
  }).join("")}
  </div>`;
}

function renderDateSearch(cls,body){
  const date=state._date;
  const isHol=(cls.hols||[]).includes(date);
  const attDay=(cls.att||{})[date];
  body.innerHTML=`
  <div class="card neon" style="margin-bottom:1rem">
    <div style="font-family:'Syne',sans-serif;font-weight:700;color:#00d4ff;margin-bottom:0.85rem">🔍 Search by Date</div>
    <div class="lbl">Select Date</div>
    <input type="date" value="${date}" style="margin-top:6px" onchange="state._date=this.value;setTab('datesearch')"/>
  </div>
  ${isHol?`<div class="card"><div style="background:rgba(255,214,10,0.07);border:1px solid rgba(255,214,10,0.22);border-radius:9px;padding:10px 14px;color:#ffd60a;font-size:0.85rem">🏖️ This date is marked as a Holiday.</div></div>`
  :attDay?`<div class="card neon">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.85rem;flex-wrap:wrap;gap:0.5rem">
      <div style="font-family:'Syne',sans-serif;font-weight:700">Attendance — ${date}</div>
      <div style="display:flex;gap:8px;font-size:0.8rem">
        <span style="color:#39ff14">✅ ${cls.students.filter(s=>attDay[s.id]).length} Present</span>
        <span style="color:#ff453a">❌ ${cls.students.filter(s=>!attDay[s.id]).length} Absent</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:0.38rem">
      ${cls.students.map((s,i)=>{const isP=attDay[s.id]===true;return`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:${isP?'rgba(57,255,20,0.05)':'rgba(255,255,255,0.02)'};border:1px solid ${isP?'rgba(57,255,20,0.2)':'rgba(0,212,255,0.14)'};border-radius:9px">
        <div style="display:flex;align-items:center;gap:9px"><span style="width:24px;height:24px;border-radius:50%;background:rgba(0,212,255,0.08);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:#00d4ff;flex-shrink:0">${i+1}</span><span style="font-weight:500;font-size:0.9rem">${s.name}</span></div>
        <span style="font-size:0.79rem;font-weight:600;color:${isP?'#39ff14':'#ff453a'}">${isP?"✅ Present":"❌ Absent"}</span>
      </div>`;}).join("")}
    </div>
  </div>`:`<div class="card"><div style="text-align:center;padding:1.5rem;color:rgba(232,234,240,0.25);font-size:0.87rem">No attendance recorded for this date.</div></div>`}`;
}

// ── ROUTER ──
function render(){
  window.scrollTo(0,0);
  if(state.page==="landing") renderLanding();
  else if(state.page==="setup") renderSetup();
  else if(state.page==="login"||state.page==="student") renderLogin(state.page==="student"?"student":"teacher");
  else if(state.page==="dashboard") renderDashboard();
  else if(state.page==="class") renderClass();
}

render();
</script>
</body>
</html>
